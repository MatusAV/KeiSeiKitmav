[package]
name = "kei-pipe"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
description = "Atom DAG pipe runtime — topo-sorts steps, pipes JSON between atoms."
authors = ["Denis Parfionovich <info@greendragon.info>"]

[[bin]]
name = "kei-pipe"
path = "src/main.rs"

[lib]
name = "kei_pipe"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
anyhow = "1"
thiserror = "1"
kei-cache = { path = "../kei-cache" }
kei-watch = { path = "../kei-watch" }
kei-scheduler = { path = "../kei-scheduler" }
rusqlite = { version = "0.31", features = ["bundled"] }

[dev-dependencies]
tempfile = "3"

[package.metadata.keisei]
backend = "none"
description = "Atom DAG pipe runtime — topo-sorts steps, pipes JSON between atoms."
authors = ["Denis Parfionovich <info@greendragon.info>"]
