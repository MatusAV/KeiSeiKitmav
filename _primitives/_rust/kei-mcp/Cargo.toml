[package]
name = "kei-mcp"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
description = "Model Context Protocol (MCP) server — exposes atom registry over stdio JSON-RPC"
authors.workspace = true
license.workspace = true


[lints]
workspace = true
[[bin]]
name = "kei-mcp"
path = "src/main.rs"

[lib]
name = "kei_mcp"
path = "src/lib.rs"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
# v0.39: io-std added for tokio::io::stdin/stdout used by the MCP stdio
# transport in main.rs (workspace tokio doesn't enable io-std by default).
tokio = { workspace = true, features = ["io-std"] }
# v0.40 (Phase C): toml needed for safe_tools::policy_chain — reads
# ~/.claude/hooks/_lib/policy-chain.toml to know which hooks to chain.
toml = "0.8"
# v0.41 (audit fix #5): killpg via libc on Unix — kill_on_drop only SIGKILLs
# the immediate child shell, leaving grandchildren orphaned. We set the child
# in its own process group and killpg() the group on timeout.
anyhow = { workspace = true }
thiserror = { workspace = true }
kei-atom-discovery = { path = "../kei-atom-discovery" }
kei-skills = { path = "../kei-skills" }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = { workspace = true }
# test-util: needed by tests/tools_call_timeout.rs for tokio::time::advance + Builder::start_paused
tokio = { workspace = true, features = ["test-util"] }
# CI race fix (2026-05-28): tools_call_dispatches.rs mutates KEI_RUNTIME_BIN_DIR
# globally. Linux runners + workspace-parallel-test sometimes saw resolve_binary()
# read a torn value. serial_test serializes only that pair, no perf cost.
serial_test = "3"

[package.metadata.keisei]
backend = "none"
description = "MCP server exposing atoms as tools, skills as resources, over stdio JSON-RPC"
authors = ["KeiSei LLC <hello@keilab.io>", "Denis Parfionovich <parfionovich@keilab.io>"]
