[package]
name = "keidna-sign"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Signed DNA manifest for KeiSeiKit primitives (sha256 hash + author + commit + lineage)"

[[bin]]
name = "keidna-sign"
path = "src/main.rs"

[lib]
name = "keidna_sign"
path = "src/lib.rs"

[dependencies]
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
anyhow = { workspace = true }
chrono = { workspace = true }
walkdir = { workspace = true }
hex = "0.4"

[dev-dependencies]
tempfile = { workspace = true }
