[package]
name = "kei-skills"
version = "0.1.0"
edition = "2021"
description = "SKILL.md format — parser, validator, fuzzy patcher, loader, hot-reload registry."
authors = ["Denis Parfionovich <info@greendragon.info>"]

[lib]
name = "kei_skills"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
similar = "2"
notify = "8"
anyhow = "1"
regex = "1"
walkdir = "2"

[dev-dependencies]
tempfile = "3"
