[role]
name = "edit-orchestrator"
display-name = "orchestrator-editor (spawns sub-agents, runs pipelines, commits to a scoped data repo)"
description = "For orchestrator-class agents that fan work out to teacher/worker sub-agents (Agent), drive multi-step pipelines (Task*), run verification oracles over arbitrary interpreters (Bash), write data artefacts (jsonl/corpus/reports), and commit each verified batch to a scoped external repo. Unlike edit-local this is NOT a Rust code-implementer role — no cargo/Constructor/test gates. Git is permitted (like `merger`); the files-whitelist keeps writes scoped. Added 2026-07-15 to host reasoning-corpus-builder, which needs Agent + Task* + arbitrary Bash + commit — none of which the code-implementer roles grant."
spawnable = true
# Native Claude Code subagent_type to hand `prepare` output to. general-purpose
# because this role's tool surface (Agent + Task* + open Bash) matches it.
claude-subagent-type = "general-purpose"

[capabilities]
# Ordered — text.md fragments concatenated in this order. Deliberately OMITS the
# Rust code-implementer gates (quality::constructor-pattern / cargo-check-green /
# tests-green, safety::no-dep-bump) and policy::no-git-ops — see description.
required = [
  "scope::files-whitelist",
  "scope::files-denylist",
  "output::report-format",
]

[tools]
# Tool allowlist — anything not in this list is denied. Superset of edit-local:
# adds Agent (spawn teacher/worker sub-agents) + the Task* pipeline tools.
allowed = ["Read", "Write", "Edit", "Glob", "Grep", "Bash", "Agent", "TaskCreate", "TaskUpdate", "TaskList", "TaskGet"]
# Orchestrator-class Bash (like git-ops `['.*']`): runs per-domain oracle checkers
# over arbitrary interpreters and commits verified batches. The files-whitelist,
# not a bash-pattern list, is the write guardrail here.
bash-patterns-allowed = ['.*']

[escalation]
policy = "ask-via-return"

[taxonomy]
kingdom = "role"
mechanism = "compose"
domain = "agent"
layer = "agent-substrate"
stage = "design-time"
stability = "stable"
language = "toml"

[lineage]
creator = "ag-orchestrator-human"
created = "2026-07-15"
